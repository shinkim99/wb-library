<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>JARVIS Workbench v1.2</title>
<style>
:root{--bg:#0c1017;--bg2:#131a24;--bg3:#1a2332;--border:#1e2d3d;--text:#d4d8e0;--text2:#8892a4;--text3:#4a5568;
  --accent:#7c6cf0;--green:#34d399;--amber:#f59e0b;--red:#ef4444;--blue:#60a5fa;--pink:#e879f9}
.light{--bg:#f7f8fa;--bg2:#fff;--bg3:#f0f2f5;--border:#e0e4ea;--text:#1f2937;--text2:#6b7280;--text3:#9ca3af;
  --accent:#6d5dd3;--green:#10b981;--amber:#d97706;--red:#dc2626;--blue:#3b82f6;--pink:#c026d3}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;transition:background .2s}
.topbar{padding:6px 12px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap}
.sidebar{width:240px;border-right:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;flex-shrink:0}
.tab-bar{display:flex;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:7px 0;border:none;border-bottom:2px solid transparent;background:none;color:var(--text3);font-size:10px;font-weight:500;cursor:pointer;font-family:inherit}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.tree-list{flex:1;overflow:auto;padding:4px 5px}
.ti{padding:5px 8px;border-radius:5px;cursor:pointer;display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--text2);transition:background .1s;user-select:none}
.ti:hover{background:var(--bg3)}.ti.act{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent);font-weight:500}
.ti-wb{padding:6px 8px;border-radius:6px;font-size:11px;font-weight:600;color:var(--accent);background:color-mix(in srgb,var(--accent) 8%,transparent);border:1px solid color-mix(in srgb,var(--accent) 15%,transparent);margin:4px 0 2px;cursor:pointer;display:flex;align-items:center;gap:5px}
.btn{padding:6px 12px;border:none;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:500;text-align:center;white-space:nowrap;transition:all .12s}
.btn:hover{filter:brightness(1.15)}.btn-s{padding:3px 7px;font-size:10px}.btn-full{width:100%}
.main{flex:1;overflow:auto;padding:16px 20px;display:flex;gap:16px}
.main-left{flex:1;min-width:0;overflow:auto}.main-right{width:340px;flex-shrink:0;display:flex;flex-direction:column;border:1px solid var(--border);border-radius:10px;background:var(--bg2);overflow:hidden}
.tag{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:500;display:inline-block}
.modal-bg{position:fixed;inset:0;background:#00000055;display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;width:500px;max-height:85vh;overflow:auto}
.field{margin-bottom:8px}.field label{font-size:10px;color:var(--text3);display:block;margin-bottom:3px}
.field input,.field select{width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:var(--bg3);color:var(--text);font-size:12px;font-family:inherit;outline:none}
.toast{position:fixed;top:12px;left:50%;transform:translateX(-50%);padding:6px 16px;border-radius:7px;color:#fff;font-size:11px;font-weight:600;z-index:200}
.link-btn{padding:3px 7px;border-radius:5px;color:var(--text2);font-size:10px;background:none;border:none;cursor:pointer;font-family:inherit}.link-btn:hover{background:var(--bg3);color:var(--text)}
.divider{width:1px;height:22px;background:var(--border);flex-shrink:0}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sec-title{font-size:12px;font-weight:600;color:var(--text2)}
.mod-row{padding:6px 10px;margin-bottom:3px;border-radius:6px;background:var(--bg3);display:flex;justify-content:space-between;align-items:center;font-size:11px}
.sk-row{padding:6px 10px;margin-bottom:3px;border-radius:6px;background:color-mix(in srgb,var(--green) 6%,transparent);border:1px solid color-mix(in srgb,var(--green) 12%,transparent);font-size:11px;color:var(--green);display:flex;justify-content:space-between;align-items:center}
.err-row{padding:6px 10px;margin-bottom:3px;border-radius:6px;background:color-mix(in srgb,var(--red) 5%,transparent);border:1px solid color-mix(in srgb,var(--red) 12%,transparent);display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:11px;color:var(--red)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.desc-box{padding:4px 10px 8px 28px;font-size:10px;color:var(--text3);line-height:1.5;background:var(--bg3);border-radius:0 0 6px 6px;margin-top:-3px;margin-bottom:3px}
.ai-msg{padding:10px 12px;margin:6px 0;border-radius:8px;font-size:12px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.ai-msg.user{background:color-mix(in srgb,var(--accent) 12%,transparent);color:var(--accent);margin-left:40px;font-size:11px}
.ai-msg.bot{background:var(--bg3);color:var(--text);margin-right:10px}
.ai-msg.err{background:color-mix(in srgb,var(--red) 10%,transparent);color:var(--red)}
.ai-msg.sys{background:color-mix(in srgb,var(--green) 10%,transparent);color:var(--green);font-size:11px;text-align:center;margin:4px 20px}
.ai-typing{padding:10px;color:var(--text3);font-size:11px}.ai-typing::after{content:"...";animation:dots 1s infinite}@keyframes dots{0%{content:"."}33%{content:".."}66%{content:"..."}}
.action-card{padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;transition:all .15s}
.action-card:hover{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 5%,transparent)}
.action-card h5{font-size:12px;font-weight:600;margin-bottom:2px}.action-card p{font-size:10px;color:var(--text3)}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;width:100%;max-width:500px}
.stat-card{padding:12px;border-radius:8px;background:var(--bg2);border:1px solid var(--border);text-align:center}
.stat-card .num{font-size:22px;font-weight:700}.stat-card .lbl{font-size:10px;color:var(--text3);margin-top:2px}
.api-status{padding:6px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text3)}
.ai-input-bar{padding:8px 10px;border-top:1px solid var(--border);display:flex;gap:6px}
.ai-input-bar input{flex:1;padding:6px 8px;border:1px solid var(--border);border-radius:6px;background:var(--bg3);color:var(--text);font-size:12px;font-family:inherit;outline:none}
.guide-card{padding:14px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);margin-bottom:10px;cursor:pointer;transition:border-color .15s}
.guide-card:hover{border-color:var(--accent)}
.guide-card h4{font-size:13px;font-weight:600;margin-bottom:4px}.guide-card p{font-size:11px;color:var(--text2);line-height:1.6}
.guide-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.setting-section{padding:12px;border:1px solid var(--border);border-radius:8px;margin-bottom:10px;background:var(--bg3)}
.setting-section h4{font-size:12px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.sk-compare{padding:8px 10px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);margin-bottom:6px;font-size:10px}
.sk-compare .from{color:var(--text3);font-size:9px;margin-top:2px}
</style></head><body>
<div id="app" style="display:flex;flex-direction:column;height:100vh"></div>
<script>
// ===== IndexedDB for file content =====
const DB_NAME="jarvis-wb-content";const DB_VER=1;let db=null;
function openDB(){return new Promise((resolve,reject)=>{const req=indexedDB.open(DB_NAME,DB_VER);
  req.onupgradeneeded=e=>{e.target.result.createObjectStore("content",{keyPath:"id"});};
  req.onsuccess=e=>{db=e.target.result;resolve(db);};req.onerror=e=>reject(e);});}
function saveContent(id,content){return new Promise((resolve,reject)=>{if(!db)return resolve();
  const tx=db.transaction("content","readwrite");tx.objectStore("content").put({id,content,size:content.length});
  tx.oncomplete=()=>resolve();tx.onerror=e=>reject(e);});}
function loadContent(id){return new Promise((resolve,reject)=>{if(!db)return resolve(null);
  const tx=db.transaction("content","readonly");const req=tx.objectStore("content").get(id);
  req.onsuccess=()=>resolve(req.result?.content||null);req.onerror=()=>resolve(null);});}
function deleteContent(id){return new Promise(resolve=>{if(!db)return resolve();
  const tx=db.transaction("content","readwrite");tx.objectStore("content").delete(id);tx.oncomplete=()=>resolve();});}

// ===== Constants =====
const PLATFORMS={github:"GitHub",n8n:"n8n",standalone:"Standalone",claude:"Claude"};
const STATUSES={active:"운영중",dev:"개발중",idea:"아이디어",archived:"보관"};
const LANGS=["HTML","JSX","Python","JavaScript","JSON","Markdown","PowerShell","Other"];
const LINKS=[{n:"Claude.ai",u:"https://claude.ai"},{n:"ChatGPT",u:"https://chat.openai.com"},{n:"Gemini",u:"https://gemini.google.com"},{n:"Perplexity",u:"https://perplexity.ai"},{n:"GitHub",u:"https://github.com"},{n:"n8n",u:"https://n8n.io"}];
const LANG_MAP={py:"Python",js:"JavaScript",jsx:"JSX",html:"HTML",json:"JSON",md:"Markdown",ps1:"PowerShell",ts:"JavaScript",css:"HTML"};
const AI_PROVIDERS=[
  {id:"claude",name:"Claude",color:"#7c6cf0",models:["claude-sonnet-4-20250514","claude-haiku-4-5-20251001"],dm:"claude-sonnet-4-20250514"},
  {id:"gpt",name:"GPT",color:"#10b981",models:["gpt-4o","gpt-4o-mini"],dm:"gpt-4o"},
  {id:"gemini",name:"Gemini",color:"#60a5fa",models:["gemini-2.0-flash","gemini-2.5-pro"],dm:"gemini-2.0-flash"}
];
const INIT_WB=[{id:"wb-ks",name:"JARVIS-KS",isDefault:true},{id:"wb-kii",name:"JARVIS-KII"},{id:"wb-work",name:"Workbench"}];
const INIT_PROG=[
  {id:"prism",wbId:"wb-ks",name:"PRISM",desc:"Parallel Review & Insight Synthesis Machine",lang:"HTML",platform:"standalone",status:"dev",ver:"v0.5",hasContent:false,contentSize:0,
    skills:[{n:"strategy-engine",d:"6가지 태스크 유형별 전략 선택",from:"PRISM"},{n:"pipeline",d:"SSE 파이프라인 관리",from:"PRISM"},{n:"pricing",d:"토큰 비용 계산",from:"PRISM"}],
    modules:[{n:"FastAPI backend",d:"Python FastAPI REST API",from:"PRISM"},{n:"SSE streaming",d:"Server-Sent Events",from:"PRISM"},{n:"Flowchart UI",d:"파이프라인 시각화",from:"PRISM"},{n:"Report finalizer",d:"최종 리포트 생성",from:"PRISM"},{n:"Dark/Light theme",d:"테마 전환",from:"PRISM"}],
    errors:["Finalizer max_tokens 8000+","Gemini 403 핸들링","Mid-pipeline pause 미구현"],github:"",notes:"v5_Final 디자인 완료.",files:[]},
  {id:"wb-app",wbId:"wb-work",name:"JARVIS Workbench",desc:"프로그램 관리 대시보드",lang:"HTML",platform:"standalone",status:"dev",ver:"v1.2",hasContent:false,contentSize:0,
    skills:[],modules:[{n:"Program Library",d:"프로그램 CRUD",from:"Workbench"},{n:"AI Analyzer",d:"멀티 AI 분석",from:"Workbench"},{n:"Skill Registry",d:"Skill 누적 관리",from:"Workbench"}],
    errors:[],github:"",notes:"현재 이 프로그램",files:[]}
];

// ===== State =====
let S={workbenches:[],programs:[],selType:null,selId:null,selSub:null,dark:true,sideTab:"programs",exp:{},toast:null,toastColor:null,descOpen:{},aiMessages:[],aiLoading:false,settings:{providers:{},defaultAI:"claude"},skillCode:{},skillCodeOpen:{}};
// In-memory content cache (loaded from IndexedDB on demand)
let contentCache={};

function load(){
  function migrateKey(nk,ok){if(!localStorage.getItem(nk)&&localStorage.getItem(ok)){localStorage.setItem(nk,localStorage.getItem(ok));localStorage.removeItem(ok);}}
  migrateKey("jarvis-programs","jwb14-p");migrateKey("jarvis-workbenches","jwb14-w");migrateKey("jarvis-settings","jwb14-s");
  try{const d=localStorage.getItem("jarvis-programs");if(d)S.programs=JSON.parse(d);else S.programs=JSON.parse(JSON.stringify(INIT_PROG));}catch(e){S.programs=JSON.parse(JSON.stringify(INIT_PROG));}
  try{const w=localStorage.getItem("jarvis-workbenches");if(w)S.workbenches=JSON.parse(w);else S.workbenches=JSON.parse(JSON.stringify(INIT_WB));}catch(e){S.workbenches=JSON.parse(JSON.stringify(INIT_WB));}
  const validWbIds=new Set(S.workbenches.map(w=>w.id));
  S.programs.forEach(p=>{if(!validWbIds.has(p.wbId))p.wbId="wb-ks";});
  try{const s=localStorage.getItem("jarvis-settings");if(s)S.settings=JSON.parse(s);}catch(e){}
  if(!S.settings.providers)S.settings.providers={};
  AI_PROVIDERS.forEach(p=>{if(!S.settings.providers[p.id])S.settings.providers[p.id]={key:"",model:p.dm};});
  if(!S.settings.defaultAI)S.settings.defaultAI="claude";
}
function save(){try{localStorage.setItem("jarvis-programs",JSON.stringify(S.programs));localStorage.setItem("jarvis-workbenches",JSON.stringify(S.workbenches));}catch(e){console.error("save error",e);}}
function saveS(){try{localStorage.setItem("jarvis-settings",JSON.stringify(S.settings));}catch(e){}}
function tt(m,c){S.toast=m;S.toastColor=c||"var(--green)";render();setTimeout(()=>{S.toast=null;render();},2500);}
function sel(){return S.selId?S.programs.find(p=>p.id===S.selId):null;}
function sn(s){return typeof s==="string"?s:s.n;}
function sd(s){return typeof s==="string"?"":s.d||"";}
function allSk(){const a=[];S.programs.forEach(p=>(p.skills||[]).forEach(s=>a.push({...typeof s==="string"?{n:s,d:""}:s,from:s.from||p.name,progId:p.id})));return a;}
function allMo(){const a=[];S.programs.forEach(p=>(p.modules||[]).forEach(m=>a.push({...typeof m==="string"?{n:m,d:""}:m,from:m.from||p.name,progId:p.id})));return a;}
function defProv(){return AI_PROVIDERS.find(a=>a.id===S.settings.defaultAI)||AI_PROVIDERS[0];}
function provCfg(id){return S.settings.providers[id]||{};}

// Get content for a program (from cache or IndexedDB)
async function getContent(progId){
  if(contentCache[progId])return contentCache[progId];
  const content=await loadContent(progId);
  if(content)contentCache[progId]=content;
  return content;
}

function h(tag,props,...ch){const el=document.createElement(tag);if(props)Object.entries(props).forEach(([k,v])=>{if(k==="class")el.className=v;else if(k==="style"&&typeof v==="object")Object.assign(el.style,v);else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);else el.setAttribute(k,v);});ch.flat(Infinity).forEach(c=>{if(c==null||c===false)return;if(typeof c==="string"||typeof c==="number")el.appendChild(document.createTextNode(c));else el.appendChild(c);});return el;}
function mkBtn(t,c,fn,cls){return h("button",{class:"btn "+(cls||""),style:{background:c+"20",color:c,border:"1px solid "+c+"44"},onClick:fn},t);}
function mkTI(label,icon,color,depth,active,onClick,count,badge){
  const d=h("div",{class:"ti"+(active?" act":""),style:{paddingLeft:(8+depth*14)+"px"},onClick},
    h("span",{style:{fontSize:"10px",color,width:"12px",textAlign:"center",flexShrink:"0"}},icon),
    h("span",{style:{flex:"1",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},label));
  if(count!==undefined)d.appendChild(h("span",{style:{fontSize:"8px",color:"var(--text3)",background:"var(--bg3)",padding:"1px 4px",borderRadius:"3px"}},""+count));
  if(badge)d.appendChild(h("span",{style:{fontSize:"7px",padding:"1px 4px",borderRadius:"3px",background:badge.c+"18",color:badge.c}},badge.t));return d;}
function parseFileName(fn){const base=fn.replace(/\.[^.]+$/,"");const ext=fn.match(/\.(\w+)$/)?.[1]||"";const rm=base.match(/[_\s-]*(Rev\d+|v\d+[\.\d]*)/i);let ver=rm?rm[1]:"Rev01";let name=base;if(rm)name=base.replace(rm[0],"");name=name.replace(/[-_]+/g," ").trim();return{name,ver,ext,lang:LANG_MAP[ext]||"Other"};}

// ===== AI API =====
async function callAI(messages,mode){
  const prov=defProv();const cfg=provCfg(prov.id);
  if(!cfg.key)throw new Error(prov.name+" API Key가 필요합니다. ⚙ Settings에서 입력하세요.");
  const sys=mode==="json"?"You are JARVIS. Respond ONLY with valid JSON, no markdown backticks.":"You are JARVIS, R&D workbench assistant. Respond in Korean with English technical terms. Be concise.";
  if(prov.id==="claude"){
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":cfg.key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:cfg.model||prov.dm,max_tokens:4000,system:sys,messages})});
    if(!res.ok)throw new Error(prov.name+" "+res.status);
    return(await res.json()).content?.map(c=>c.text||"").join("")||"";
  }else if(prov.id==="gpt"){
    const res=await fetch("https://api.openai.com/v1/chat/completions",{method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+cfg.key},
      body:JSON.stringify({model:cfg.model||prov.dm,max_tokens:4000,messages:[{role:"system",content:sys},...messages]})});
    if(!res.ok)throw new Error(prov.name+" "+res.status);
    return(await res.json()).choices?.[0]?.message?.content||"";
  }else if(prov.id==="gemini"){
    const res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/"+(cfg.model||prov.dm)+":generateContent?key="+cfg.key,{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({systemInstruction:{parts:[{text:sys}]},contents:messages.map(m=>({role:m.role==="assistant"?"model":"user",parts:[{text:m.content}]}))})});
    if(!res.ok)throw new Error(prov.name+" "+res.status);
    return(await res.json()).candidates?.[0]?.content?.parts?.[0]?.text||"";
  }
}

async function analyzeAndApply(p,action){
  const prov=defProv();
  S.aiMessages.push({role:"user",content:"["+action+"] "+p.name});S.aiLoading=true;render();
  const content=await getContent(p.id);
  const code=content?(content.length>12000?content.slice(0,8000)+"\n\n... (중간 생략: "+(content.length-12000)+" bytes) ...\n\n"+content.slice(-4000):content):"(코드 없음 — 파일을 드래그하여 업로드하세요)";
  const ctx="프로그램: "+p.name+"\n설명: "+p.desc+"\n언어: "+p.lang+"\n모듈: "+(p.modules||[]).map(sn).join(", ")+"\nSkill: "+(p.skills||[]).map(sn).join(", ");
  try{
    if(action==="analyze"||action==="skill"){
      const jsonPrompt=action==="analyze"
        ?ctx+"\n\n코드:\n"+code+"\n\n이 프로그램을 분석하여 JSON으로 응답:\n{\"modules\":[{\"n\":\"모듈명\",\"d\":\"설명\"}],\"skills\":[{\"n\":\"스킬명\",\"d\":\"설명\"}],\"errors\":[\"에러설명\"],\"summary\":\"분석요약\"}"
        :ctx+"\n\n코드:\n"+code+"\n\n모듈을 Skill로 변환. JSON 응답:\n{\"skills\":[{\"n\":\"스킬명\",\"d\":\"SKILL.md 요약\"}],\"summary\":\"변환요약\"}";
      const raw=await callAI([{role:"user",content:jsonPrompt}],"json");
      let result;
      try{result=JSON.parse(raw.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim());}
      catch(e){S.aiMessages.push({role:"assistant",content:"["+prov.name+"]\n"+raw});S.aiLoading=false;render();return;}
      // Auto-apply
      if(result.modules?.length){const ex=new Set((p.modules||[]).map(sn));const nw=result.modules.filter(m=>!ex.has(m.n));
        if(nw.length){p.modules=[...(p.modules||[]),...nw.map(m=>({n:m.n,d:m.d,from:p.name}))];
          S.aiMessages.push({role:"system",content:"✅ "+nw.length+"개 Module 자동 등록: "+nw.map(m=>m.n).join(", ")});}}
      if(result.skills?.length){const ex=new Set((p.skills||[]).map(sn));const nw=result.skills.filter(s=>!ex.has(s.n));
        if(nw.length){p.skills=[...(p.skills||[]),...nw.map(s=>({n:s.n,d:s.d,from:p.name}))];
          S.aiMessages.push({role:"system",content:"✅ "+nw.length+"개 Skill 자동 등록: "+nw.map(s=>s.n).join(", ")});}}
      if(result.errors?.length){const ex=new Set(p.errors||[]);const nw=result.errors.filter(e=>!ex.has(e));
        if(nw.length){p.errors=[...(p.errors||[]),...nw];S.aiMessages.push({role:"system",content:"⚠ "+nw.length+"개 Error 등록"});}}
      S.aiMessages.push({role:"assistant",content:"["+prov.name+" "+(action==="analyze"?"구조분석":"Skill생성")+" 완료]\n\n"+(result.summary||"완료")+"\n\nModules: "+(p.modules||[]).map(sn).join(", ")+"\nSkills: "+(p.skills||[]).map(sn).join(", ")});
    }else{

function extractSkillCode(content,skillName){
  if(!content)return null;
  const lines=content.split('\n');
  const kw=skillName.replace(/[-_\s]+/g,'[-_\\s]*');
  const re=new RegExp(kw,'i');
  let best=-1;
  for(let i=0;i<lines.length;i++){
    if(!re.test(lines[i]))continue;
    if(/function[\s(]|def\s|class\s|const\s|async\s|export\s/.test(lines[i])){best=i;break;}
    if(best===-1)best=i;
  }
  if(best===-1)return null;
  const start=Math.max(0,best-2);
  let end=Math.min(lines.length-1,best+30);
  let depth=0,inBlock=false;
  for(let i=best;i<Math.min(lines.length,best+100);i++){
    for(const ch of lines[i]){if(ch==='{'||ch==='('){depth++;inBlock=true;}if(ch==='}'||ch===')'){depth--;}}
    if(inBlock&&depth<=0){end=Math.min(i+1,lines.length-1,best+80);break;}
  }
  const snip=lines.slice(start,end+1).join('\n');
  return snip.length>2000?snip.slice(0,2000)+'\n... (이하 생략)':snip;}

// ===== Init =====
async function init(){
  await openDB();
  load();
  // Check content availability for each program
  for(const p of S.programs){
    if(p.hasContent){
      const content=await loadContent(p.id);
      if(content)contentCache[p.id]=content;
      else{p.hasContent=false;p.contentSize=0;}
    }
  }
  render();
}
init();
